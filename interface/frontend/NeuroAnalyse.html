                              fontSize:11.5, fontWeight:700, padding:"2px 8px", borderRadius:5,
                              color: u.is_locked ? "#92400e" : "#15803d",
                              background: u.is_locked ? "#fffbeb" : "#f0fdf4",
                              border: `1px solid ${u.is_locked ? "#fcd34d" : "#86efac"}`,
                            }}>
                              {u.is_locked ? (lang==="tr"?"Kilitli":"Locked") : (lang==="tr"?"Aktif":"Active")}
                            </span>
                          </td>
                          <td>
                            <button className="btn-secondary" style={{padding:"5px 10px", fontSize:11.5}}
                              disabled={!u.is_locked}
                              onClick={() => unlockUser(u.id)}>
                              {lang==="tr"?"Kilidi Aç":"Unlock"}
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>

                  <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", margin:"24px 0 12px"}}>
                    <div style={{fontSize:13, fontWeight:700, color:"var(--text-2)"}}>
                      {lang==="tr"?"Denetim Logu":"Audit Log"}
                    </div>
                    <button className="btn-secondary" style={{padding:"6px 12px", fontSize:12}}
                      onClick={() => { window.location.href = "/api/audit/export"; }}>
                      {lang==="tr"?"CSV Dışa Aktar":"Export CSV"}
                    </button>
                  </div>
                  <table className="patients-table">
                    <thead>
                      <tr>
                        <th>{lang==="tr"?"Zaman":"Time"}</th>
                        <th>{lang==="tr"?"Olay":"Event"}</th>
                        <th>{lang==="tr"?"Kullanıcı":"User"}</th>
                        <th>{lang==="tr"?"Detay":"Details"}</th>
                      </tr>
                    </thead>
                    <tbody>
                      {auditLogs.map(l => (
                        <tr key={l.id}>
                          <td style={{fontFamily:"'DM Mono',monospace", fontSize:11.5}}>
                            {new Date(l.timestamp).toLocaleString(lang==="tr"?"tr-TR":"en-US")}
                          </td>
                          <td style={{fontWeight:600, color:"var(--text)"}}>{l.action}</td>
                          <td style={{color:"var(--text-3)"}}>{l.username || "—"}</td>
                          <td style={{color:"var(--text-3)", fontSize:12}}>{l.details || "—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "tr",
  "accentColor": "#2563eb",
  "compactSidebar": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = useState(TWEAK_DEFAULTS.lang || "tr");
  const [page, setPage] = useState("dashboard");
  const [result, setResult] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [noticeAccepted, setNoticeAccepted] = useState(false);
  const [license, setLicense] = useState(null);
  const [selectedPatient, setSelectedPatient] = useState(null);
  const [patientCount, setPatientCount] = useState(null);

  const t = T[lang];

  // Browser history navigation
  const navigateTo = React.useCallback((newPage, state = {}) => {
    window.history.pushState({ page: newPage, ...state }, "", `#${newPage}`);
    setPage(newPage);
  }, []);

  useEffect(() => {
    const onPop = (e) => {
      const pg = e.state?.page || "dashboard";
      setPage(pg);
      if (pg !== "patientDetail") setSelectedPatient(null);
      if (pg !== "results") setResult(null);
    };
    window.addEventListener("popstate", onPop);
    window.history.replaceState({ page: "dashboard" }, "", "#dashboard");
    return () => window.removeEventListener("popstate", onPop);
  }, []);

  useEffect(() => {
    apiFetch("/api/auth/me")
      .then(user => {
        setCurrentUser(user);
        setLang(user.language || TWEAK_DEFAULTS.lang || "tr");
      })
      .catch(() => setCurrentUser(null))
      .finally(() => setAuthChecked(true));
  }, []);

  useEffect(() => {
    if (!currentUser?.role || currentUser.role !== "admin") return;
    apiFetch("/api/license").then(setLicense).catch(() => {});
  }, [currentUser?.id]);

  useEffect(() => {
    if (!currentUser?.id) return;
    apiFetch("/api/patients")
      .then(items => setPatientCount(Array.isArray(items) ? items.length : null))
      .catch(() => setPatientCount(null));
  }, [currentUser?.id]);

  const handleLangChange = (l) => {
    setLang(l);
    setTweak("lang", l);
  };

  const handleLogout = async () => {
    try { await apiFetch("/api/auth/logout", { method: "POST" }); } catch (_) {}
    setCurrentUser(null);
    setNoticeAccepted(false);
    setLicense(null);
    setPage("dashboard");
  };

  const handleResult = (r) => {
    setResult(r);
    setSelectedPatient(null);
    navigateTo("results");
  };

  const handleNewAnalysis = () => {
    setResult(null);
    setSelectedPatient(null);
    navigateTo("new");
  };

  const openAnalysisRecord = async (analysisId) => {
    try {
      const full = await apiFetch(`/api/analyses/${analysisId}`);
      setResult(analysisToResult(full, lang));
      setSelectedPatient(null);
      navigateTo("results");
    } catch (_) {}
  };

  const openPatientAnalysis = async (patientId) => {
    try {
      const list = await apiFetch(`/api/analyses?patient_id=${encodeURIComponent(patientId)}&limit=1`);
      const item = list.items?.[0];
      if (!item) return;
      await openAnalysisRecord(item.id);
    } catch (_) {}
  };

  const openPatientDetail = async (patientId) => {
    try {
      const patient = await apiFetch(`/api/patients/${encodeURIComponent(patientId)}`);
      setSelectedPatient(patient);
      setResult(null);
      navigateTo("patientDetail");
    } catch (_) {}
  };

  const navItems = [
    { id:"dashboard", label: t.nav_dashboard, icon: ICONS.grid },
    { id:"new",       label: t.nav_new,       icon: ICONS.plus },
    { id:"patients",  label: t.nav_patients,  icon: ICONS.users, badge: patientCount },
    { id:"reports",   label: t.nav_reports,   icon: ICONS.file },
    { id:"settings",  label: t.nav_settings,  icon: ICONS.settings },
  ];

  const pageTitle = {
    dashboard: t.nav_dashboard,
    new: t.nav_new,
    patients: t.nav_patients,
    reports: t.nav_reports,
    settings: t.nav_settings,
    results: t.modal_title,
    patientDetail: t.patients_title,
  }[page] || "";

  const renderContent = () => {
    if (page === "dashboard") return <DashboardView lang={lang} onNavigate={navigateTo} onOpenAnalysis={openPatientAnalysis} />;
    if (page === "new") return <NewAnalysisView lang={lang} onResult={handleResult} />;
    if (page === "patients") return <PatientsView lang={lang} onOpenPatient={openPatientDetail} onPatientDeleted={()=>navigateTo("patients")} />;
    if (page === "patientDetail" && selectedPatient) return <PatientDetailView lang={lang} patient={selectedPatient} onOpenAnalysis={openAnalysisRecord} onNewAnalysis={handleNewAnalysis} onBack={()=>navigateTo("patients")} />;
    if (page === "results" && result) return <ResultsView result={result} lang={lang} onNew={handleNewAnalysis} />;
    if (page === "reports") return <ReportsView lang={lang} onOpenAnalysis={openAnalysisRecord} />;
    if (page === "settings") return <SettingsView lang={lang} currentUser={currentUser} onLogout={handleLogout} onLicenseChange={setLicense} />;
    return null;
  };

  if (!authChecked) {
    return (
      <div className="loading-overlay">
        <div className="loading-card">
          <div className="spinner-ring"></div>
          <div className="loading-title">{lang==="tr"?"Oturum kontrol ediliyor...":"Checking session..."}</div>
        </div>
      </div>
    );
  }

  if (!currentUser) {
    return <LoginView lang={lang} onLogin={(user)=>{ setCurrentUser(user); setNoticeAccepted(false); }} />;
  }

  return (
    <React.Fragment>
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-brand">
          <div className="brand-logo">
            <LogoMark size={24} />
          </div>
          <div className="brand-text">
            <div className="brand-name">{t.appName}</div>
            <div className="brand-sub">{t.appSub}</div>
          </div>
        </div>

        <nav className="sidebar-nav">
          <div className="nav-section-label">{lang==="tr"?"Ana Menü":"Menu"}</div>
          {navItems.map(item => (
            <button
              key={item.id}
              className={`nav-item${page===item.id||(page==="results"&&item.id==="new")||(page==="patientDetail"&&item.id==="patients")?" active":""}`}
              onClick={()=>{ navigateTo(item.id); }}
            >
              <Icon d={item.icon} size={16} stroke="currentColor" />
              {item.label}
              {item.badge && <span className="nav-badge">{item.badge}</span>}
            </button>
          ))}
        </nav>

        <div className="sidebar-bottom">
          <div className="sidebar-user">
            <div className="user-avatar">{(currentUser.full_name || currentUser.username || "U").slice(0,1).toUpperCase()}</div>
            <div>
              <div className="user-name">{currentUser.full_name || currentUser.username}</div>
              <div className="user-role">{currentUser.role === "admin" ? "Admin" : (lang==="tr"?"Klinisyen":"Clinician")}</div>
            </div>
          </div>
        </div>
      </aside>

      {/* Main area */}
      <div className="main-area">
        <div className="topbar">
          <div className="topbar-title">{pageTitle}</div>
          <div className="topbar-right">
            <div className="lang-toggle">
              <button className={`lang-btn${lang==="tr"?" active":""}`} onClick={()=>handleLangChange("tr")}>TR</button>
              <button className={`lang-btn${lang==="en"?" active":""}`} onClick={()=>handleLangChange("en")}>EN</button>
            </div>
            {license && <div className={`status-badge ${license.status}`}>DEMO</div>}
            <button className="topbar-icon-btn" title="Notifications">
              <Icon d={ICONS.bell} size={15} />
            </button>
          </div>
        </div>

        <div className="content-scroll">
          {renderContent()}
        </div>

      </div>

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection label={lang==="tr"?"Dil / Language":"Language"} />
        <TweakRadio
          label={lang==="tr"?"Arayüz Dili":"Interface Language"}
          value={lang}
          options={["tr","en"]}
          onChange={(v) => handleLangChange(v)}
        />
        <TweakSection label={lang==="tr"?"Renk / Color":"Color"} />
        <TweakColor
          label={lang==="tr"?"Vurgu Rengi":"Accent Color"}
          value={tweaks.accentColor || "#2563eb"}
          onChange={(v) => {
            setTweak("accentColor", v);
            document.documentElement.style.setProperty("--accent", v);
          }}
        />
      </TweaksPanel>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
